# Vault config — demo example for list reorder testing

[vault]
id = "finance-2025"
display_name = "Finance 2025"
order = 7
vault_file = "archive/Finance 2025.7z"
store_dir = "store"
backups_dir = "backups"
password_hint = "Year end"
note = "Tax receipts and invoices"

[storage]
mode = "encrypted_dir"

[close]
default_action = "close"

[backup]
enabled = false
mode = "keep_last"

[security]
# Session — password retention (PRD §4); v1 encrypted_dir → session_ram
mode = "session_ram"
secure_wipe_workspace = true
wipe_passes = 1
wipe_pattern = "random"

[auto_close]
enabled = false
idle_minutes = 15
warn_before_seconds = 0
close_on_app_minimize = false

[seven_zip]
encrypt_file_names = true
archive_mode = "encrypt_only"

[policy]
allow_external_editors = true
disallow_copy_outside_mount = false
require_unmount_on_sleep = false
