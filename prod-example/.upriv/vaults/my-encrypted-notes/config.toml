# Vault config — storage, security, backup, 7z, policies (static; survives seal)
# Example 1 — baseline closed vault (encrypt-only archive, keep_last backup)

[vault]
id = "my-encrypted-notes"
display_name = "My Encrypted Notes"
order = 4
vault_file = "archive/My Encrypted Notes.7z"
store_dir = "store"
backups_dir = "backups"
password_hint = "hint: childhood street"
note = "Personal notes and drafts."

[storage]
mode = "encrypted_dir"

[close]
default_action = "close"

[backup]
enabled = true
mode = "keep_last"
keep_last = 1

[security]
# Session — password retention (PRD §4); v1 encrypted_dir → session_ram
mode = "session_ram"
secure_wipe_workspace = true
wipe_passes = 1
wipe_pattern = "random"

[auto_close]
enabled = false
idle_minutes = 15
warn_before_seconds = 60
close_on_app_minimize = false

[seven_zip]
encrypt_file_names = true
archive_mode = "encrypt_only"
compression_level = 5
solid = false
method = "lzma2"

[policy]
allow_external_editors = false
disallow_copy_outside_mount = true
require_unmount_on_sleep = true
