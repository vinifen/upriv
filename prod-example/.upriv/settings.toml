# Upriv marker + app settings (vault-root directory)

[package]
version = 1
label = "Upriv Demo"
vaults_dir = ".upriv/vaults"       # vaults/<id>/ — config.toml, persistence, archive, store, …
state_file = ".upriv/state.json"   # open sessions only (cleared on quit)
logs_dir = ".upriv/logs"
app_dir = ".upriv/app"
workspace_dir = "workspace"
default_vault = "my-encrypted-notes"

[ui]
locale = "en"   # UI: dev/apps/shared/locales/{locale}.json
theme = "dark"
# Vault list preferences (desktop UI reads/writes when wired to upriv-daemon)
vault_list_sort = "order"              # order | name | state | last_accessed
vault_list_sort_direction = "asc"      # asc | desc
vault_list_view = "default"            # default | large | compact | blocks
always_show_hidden_vaults = false
file_manager_dock_expanded = false   # minimized file managers: show all chips vs single expand button

[logging]
enabled = true
level = "info"                    # trace | debug | info | warn | error
entries_per_file = 1000

[app]
# Vault-root mode (nearby vs custom) is NOT configured here.
# It lives in the app-home `.upriv-root` alias:
#   missing or status=inactive → nearby mode
#   status=active + path → custom vault-root
last_opened_vault = "my-encrypted-notes"
